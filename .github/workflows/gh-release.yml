# Drafts a GitHub release with the signed release APK attached.
name: Draft GitHub release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as glacier-v5.0.5
        required: true
  push:
    tags:
      - glacier-v*.*.*

permissions:
  contents: write

jobs:
  android:
    name: Draft release and attach APK
    runs-on: ubuntu-latest
    environment: release-android

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      SECRET: ${{ secrets.SECRET }}
      UPLOAD_KEYSTORE: ${{ secrets.UPLOAD_KEYSTORE }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Validate release version
        shell: bash
        run: |
          if ! [[ "$RELEASE_TAG" =~ ^glacier-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must look like glacier-v5.0.5, got $RELEASE_TAG"
            exit 1
          fi

          VERSION="${RELEASE_TAG#glacier-v}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)

          if [ "$PUBSPEC_VERSION" != "$VERSION" ]; then
            echo "::error::Tag $RELEASE_TAG does not match pubspec.yaml version $PUBSPEC_VERSION"
            exit 1
          fi

      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in CLIENT_ID SECRET UPLOAD_KEYSTORE STORE_PASSWORD KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name secret is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode upload keystore
        shell: bash
        run: |
          printf '%s' "$UPLOAD_KEYSTORE" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        shell: bash
        run: |
          cat > android/key.properties <<EOF_KEY_PROPERTIES
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=upload
          storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks
          EOF_KEY_PROPERTIES

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        shell: bash
        run: |
          flutter build apk --release --dart-define=CLIENT_ID="$CLIENT_ID" --dart-define=SECRET="$SECRET"
          mv build/app/outputs/flutter-apk/app-release.apk "glacier-android-${RELEASE_TAG}.apk"

      - name: Extract release notes
        id: release_notes
        shell: bash
        run: |
          VERSION="$RELEASE_TAG"
          RELEASE_NOTES_VERSION="v${RELEASE_TAG#glacier-v}"
          RELEASE_NOTES_FILE="assets/release-notes.md"

          NOTES=$(awk -v version="$RELEASE_NOTES_VERSION" '
            BEGIN { found=0; output="" }
            $0 ~ "^## " version "$" { found=1; next }
            found && /^[A-Z][a-z]+ [0-9]+, [0-9]+$/ { next }
            found && /^---$/ { exit }
            found && /^## v[0-9]+\.[0-9]+\.[0-9]+$/ { exit }
            found { output = output $0 "\n" }
            END { print output }
          ' "$RELEASE_NOTES_FILE")

          NOTES=$(echo "$NOTES" | sed 's/ on GitHub)/)/')
          NOTES=$(echo "$NOTES" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          if [ -n "$NOTES" ]; then
            PREV_TAG=$(git describe --tags --match 'glacier-v*' --abbrev=0 "$VERSION^" 2>/dev/null || echo "")

            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "body<<EOF_RELEASE_NOTES" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            if [ -n "$PREV_TAG" ]; then
              echo "" >> "$GITHUB_OUTPUT"
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}" >> "$GITHUB_OUTPUT"
            fi
            echo "EOF_RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No release notes found for $VERSION in $RELEASE_NOTES_FILE"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: ${{ steps.release_notes.outputs.found != 'true' }}
          body: ${{ steps.release_notes.outputs.found == 'true' && steps.release_notes.outputs.body || '' }}
          files: glacier-android-${{ env.RELEASE_TAG }}.apk
